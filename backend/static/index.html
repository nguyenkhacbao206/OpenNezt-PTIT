<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VI⇄EN Translator — Test Console</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Be+Vietnam+Pro:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');
  :root {
    --bg:#14121a; --surface:#1c1922; --surface2:#241f2c; --line:#322c3c;
    --ink:#f1ebe1; --muted:#9a9187; --faint:#6b6472;
    --src:#e9b44c;   /* amber — original speech */
    --dst:#57c9b5;   /* jade — translation */
    --live:#ff5a6e;  /* record / live signal */
    --err:#ff8a99;
    --display:'Space Grotesk', system-ui, sans-serif;
    --body:'Be Vietnam Pro', system-ui, 'Segoe UI', sans-serif;
    --mono:'IBM Plex Mono', ui-monospace, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; color: var(--ink); font-family: var(--body); font-size: 15px; line-height: 1.5;
    background:
      radial-gradient(120% 80% at 85% -10%, rgba(87,201,181,.10), transparent 55%),
      radial-gradient(120% 80% at 10% -10%, rgba(233,180,76,.10), transparent 55%),
      var(--bg);
    min-height: 100vh;
  }
  .app { max-width: 960px; margin: 0 auto; padding: 20px 18px 48px; }

  /* ---- top bar ---- */
  .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding-bottom: 16px; border-bottom: 1px solid var(--line); }
  .brand { display: flex; align-items: baseline; gap: 12px; }
  .brand-mark { font-family: var(--display); font-weight: 700; font-size: 22px; letter-spacing: .01em; }
  .brand-mark .swap { color: var(--dst); margin: 0 2px; }
  .brand-sub { color: var(--muted); font-size: 13px; }
  .status { font-family: var(--mono); font-size: 12px; padding: 4px 12px; border-radius: 999px; background: var(--surface2); border: 1px solid var(--line); color: var(--muted); }
  .status.on { color: var(--dst); border-color: rgba(87,201,181,.4); }
  .status.err { color: var(--err); border-color: rgba(255,138,153,.4); }

  /* ---- controls ---- */
  .controls { display: flex; flex-wrap: wrap; align-items: flex-end; gap: 14px; padding: 18px 0; border-bottom: 1px solid var(--line); }
  .ctrl-label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--faint); margin-bottom: 5px; }
  select {
    padding: 9px 12px; background: var(--surface2); border: 1px solid var(--line); border-radius: 9px;
    color: var(--ink); font-family: var(--body); font-size: 14px; cursor: pointer;
  }
  select:focus-visible, .toggle:focus-within { outline: 2px solid var(--dst); outline-offset: 2px; }
  .langs { display: flex; align-items: flex-end; gap: 10px; }
  .lang-swap { color: var(--faint); font-size: 18px; padding-bottom: 8px; }
  .toggle { display: inline-flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); cursor: pointer; padding-bottom: 8px; }
  .toggle input { width: 16px; height: 16px; accent-color: var(--dst); }
  .spacer { flex: 1; }
  .btn { cursor: pointer; border-radius: 9px; padding: 10px 18px; font-family: var(--display); font-weight: 500; font-size: 14px; letter-spacing: .01em; border: 1px solid transparent; transition: .16s; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-primary { background: var(--dst); color: #0c1512; }
  .btn-primary:hover:not(:disabled) { filter: brightness(1.08); }
  .btn-ghost { background: transparent; color: var(--ink); border-color: var(--line); }
  .btn-ghost:hover:not(:disabled) { border-color: var(--muted); }
  .btn.small { padding: 7px 12px; font-size: 12px; }

  /* ---- stage (signature) ---- */
  .stage { padding: 28px 0 10px; }
  .mic-row { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; }
  #rec {
    display: inline-flex; align-items: center; gap: 11px; cursor: pointer;
    padding: 14px 28px; border-radius: 999px; border: 1px solid var(--line);
    background: var(--surface2); color: var(--ink);
    font-family: var(--display); font-weight: 500; font-size: 15px; letter-spacing: .01em; transition: .18s;
  }
  #rec::before { content: ""; width: 11px; height: 11px; border-radius: 50%; background: var(--muted); transition: .18s; }
  #rec:hover:not(:disabled) { border-color: var(--dst); }
  #rec:disabled { opacity: .4; cursor: not-allowed; }
  #rec.active { border-color: var(--live); color: #fff; background: rgba(255,90,110,.14); }
  #rec.active::before { background: var(--live); box-shadow: 0 0 0 0 rgba(255,90,110,.5); animation: pulse 1.2s infinite; }
  @keyframes pulse { 70% { box-shadow: 0 0 0 9px rgba(255,90,110,0); } 100% { box-shadow: 0 0 0 0 rgba(255,90,110,0); } }

  .live { border: 1px solid var(--line); border-radius: 16px; padding: 24px 26px; background: linear-gradient(180deg, var(--surface) , var(--bg)); box-shadow: 0 20px 60px -30px rgba(0,0,0,.7); }
  .live-label { display: flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: .12em; color: var(--live); margin-bottom: 18px; }
  .pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--live); animation: blink 1.1s infinite; }
  @keyframes blink { 50% { opacity: .25; } }
  .live-src { color: var(--src); font-size: 20px; font-weight: 500; line-height: 1.45; min-height: 1.4em; }
  .live-arrow { color: var(--faint); font-size: 22px; margin: 8px 0; }
  .live-dst { color: var(--dst); font-size: 26px; font-weight: 700; line-height: 1.4; letter-spacing: -.01em; min-height: 1.4em; }
  .stage-hint { color: var(--faint); font-size: 14px; padding: 26px 4px; text-align: center; }

  /* ---- conversation feed ---- */
  .section-h { font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: .12em; color: var(--faint); margin: 32px 0 14px; }
  .turn { border-top: 1px solid var(--line); padding: 16px 2px; }
  .turn .spk { font-family: var(--mono); font-size: 11px; letter-spacing: .04em; color: var(--faint); text-transform: uppercase; }
  .turn .src { color: var(--src); font-size: 15px; margin: 8px 0 3px; }
  .turn .dst { color: var(--dst); font-size: 19px; font-weight: 600; line-height: 1.4; margin: 3px 0 8px; }
  .turn .meta { font-family: var(--mono); font-size: 11px; color: var(--faint); display: flex; gap: 10px; flex-wrap: wrap; }
  .badge { font-size: 10px; padding: 2px 8px; border-radius: 5px; background: var(--surface2); border: 1px solid var(--line); color: var(--muted); }

  /* ---- event log ---- */
  .logbox { margin-top: 34px; border: 1px solid var(--line); border-radius: 12px; background: var(--surface); overflow: hidden; }
  .logbox summary { cursor: pointer; padding: 12px 16px; font-family: var(--mono); font-size: 12px; letter-spacing: .06em; color: var(--muted); text-transform: uppercase; list-style: none; }
  .logbox summary::-webkit-details-marker { display: none; }
  .logbox summary::before { content: "▸ "; color: var(--faint); }
  .logbox[open] summary::before { content: "▾ "; }
  #log { font-family: var(--mono); font-size: 11.5px; line-height: 1.7; max-height: 260px; overflow-y: auto; padding: 4px 16px 12px; }
  #log .in { color: var(--dst); } #log .out { color: var(--src); } #log .e { color: var(--err); } #log .t { color: var(--faint); }
  audio { width: 100%; margin: 0 16px 14px; width: calc(100% - 32px); }

  @media (max-width: 720px) {
    .brand-sub { display: none; }
    .live-dst { font-size: 22px; } .live-src { font-size: 17px; }
    .spacer { flex-basis: 100%; height: 0; }
  }
  @media (prefers-reduced-motion: reduce) { *, ::before { animation: none !important; } }
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">VI<span class="swap">⇄</span>EN</span>
      <span class="brand-sub">Phiên dịch trực tiếp cuộc họp</span>
    </div>
    <span id="status" class="status">chưa kết nối</span>
  </header>

  <section class="controls">
    <div>
      <span class="ctrl-label">Chế độ</span>
      <select id="mode">
        <option value="cloud">Cloud · Groq</option>
        <option value="offline">Offline · Whisper</option>
        <option value="mock">Mock</option>
      </select>
    </div>
    <div class="langs">
      <div>
        <span class="ctrl-label">Nguồn</span>
        <select id="src"><option value="vi">Tiếng Việt</option><option value="en">English</option></select>
      </div>
      <span class="lang-swap">⇄</span>
      <div>
        <span class="ctrl-label">Đích</span>
        <select id="dst"><option value="en">English</option><option value="vi">Tiếng Việt</option></select>
      </div>
    </div>
    <label class="toggle"><input type="checkbox" id="ttsOn" checked /><span>🔊 Đọc bản dịch</span></label>
    <div class="spacer"></div>
    <button id="connect" class="btn btn-primary">Kết nối</button>
    <button id="end" class="btn btn-ghost" disabled>Kết thúc</button>
  </section>

  <main class="stage">
    <div class="mic-row">
      <button id="rec" disabled>Nhấn để nói</button>
      <button id="fake" class="btn btn-ghost small" disabled>Gửi audio giả</button>
    </div>

    <div id="live" class="live" style="display:none">
      <div class="live-label"><span class="pulse"></span> Đang nói — bản dịch trực tiếp</div>
      <div id="liveSrc" class="live-src"></div>
      <div class="live-arrow">⇣</div>
      <div id="liveDst" class="live-dst"></div>
    </div>
    <p class="stage-hint" id="stageHint">Bấm <b>Kết nối</b>, rồi <b>Nhấn để nói</b>. Bản dịch hiện ra ngay trong khi bạn đang nói.</p>
  </main>

  <section>
    <h2 class="section-h">Hội thoại</h2>
    <div id="turns"></div>
  </section>

  <details class="logbox">
    <summary>Nhật ký sự kiện</summary>
    <div id="log"></div>
    <audio id="player" controls></audio>
  </details>
</div>

<script>
const $ = (id) => document.getElementById(id);
let ws = null, audioCtx = null, stream = null, processor = null, sourceNode = null;
let recording = false, inRate = 48000, curTurn = null;
// Cắt lời theo CỤM (VAD nhẹ theo năng lượng) để dịch + đọc cuốn chiếu khi đang nói.
let segFrames = [], segMs = 0, silenceMs = 0, speaking = false;
const SPEECH_RMS = 0.012;   // ngưỡng coi là đang nói (chỉnh nếu mic to/nhỏ)
const SILENCE_MS = 650;     // ngừng bao lâu thì chốt cụm
const MIN_SEG_MS = 500;     // cụm tối thiểu (bỏ tiếng động ngắn)
const MAX_SEG_MS = 6000;    // cụm dài liền mạch -> cắt cưỡng bức
// Hàng đợi phát audio: phát từng cụm theo thứ tự, không đè nhau.
let audioQueue = [], audioBusy = false;

// ---------- logging ----------
function log(dir, type, data) {
  const el = $("log");
  const cls = dir === "in" ? "in" : dir === "out" ? "out" : dir === "err" ? "e" : "t";
  const arrow = dir === "in" ? "<<<" : dir === "out" ? ">>>" : "  •";
  let txt = typeof data === "string" ? data : JSON.stringify(data);
  if (txt.length > 140) txt = txt.slice(0, 140) + "…";
  const line = document.createElement("div");
  line.className = cls;
  line.textContent = `${arrow} ${type} ${txt}`;
  el.appendChild(line); el.scrollTop = el.scrollHeight;
}
function setStatus(s, kind) { const e = $("status"); e.textContent = s; e.className = "status" + (kind ? " " + kind : ""); }

// ---------- websocket ----------
function connect() {
  const proto = location.protocol === "https:" ? "wss" : "ws";
  ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.onopen = () => {
    setStatus("đã kết nối", "on");
    send("session.start", { mode: $("mode").value, sourceLang: $("src").value, targetLang: $("dst").value });
    send("config.update", { ttsOn: $("ttsOn").checked });   // audio đọc bằng edge-tts (backend)
    $("end").disabled = false; $("rec").disabled = false; $("fake").disabled = false;
    $("connect").disabled = true;
  };
  ws.onclose = () => { setStatus("chưa kết nối"); resetButtons(); };
  ws.onerror = () => { setStatus("lỗi kết nối", "err"); log("err", "ws.error", "connection failed"); };
  ws.onmessage = (ev) => handleEvent(JSON.parse(ev.data));
}
function send(type, data) { ws.send(JSON.stringify({ type, data })); log("out", type, type.indexOf("audio.") === 0 ? "<audio…>" : data); }
function resetButtons() {
  $("connect").disabled = false; $("end").disabled = true;
  $("rec").disabled = true; $("fake").disabled = true;
  recording = false;
  audioQueue = []; audioBusy = false;
  if ("speechSynthesis" in window) window.speechSynthesis.cancel();
  hideLive();
  $("stageHint").style.display = "";
  $("src").disabled = $("dst").disabled = $("mode").disabled = false;
}

function handleEvent(msg) {
  const { type, data } = msg;
  log("in", type, type === "tts.audio" ? `<audio ${data.audio.length}b64>` : data);
  switch (type) {
    case "stt.partial":                    // transcript gốc tạm khi đang nói
      showLive(); $("liveSrc").textContent = data.text; break;
    case "stt.final":                      // câu gốc chốt (đi kèm bản final)
      curTurn = newTurn(data.speaker, data.lang);
      curTurn.querySelector(".src").textContent = data.text;
      break;
    case "nmt.partial":                    // BẢN DỊCH cập nhật LIÊN TỤC khi đang nói
      showLive();
      if (data.srcText) $("liveSrc").textContent = data.srcText;
      $("liveDst").textContent = data.dstText || "";
      break;
    case "nmt.result":                     // bản dịch chốt -> vào hội thoại
      hideLive();
      if (!curTurn) curTurn = newTurn(data.speaker, "");
      curTurn.querySelector(".src").textContent = data.srcText;
      // Chốt: hiện dần từng chữ. Audio (edge-tts) tới qua tts.audio và khi nạp
      // xong sẽ khớp lại nhịp chữ theo độ dài audio (chữ & tiếng chạy cùng lúc).
      startReveal(curTurn.querySelector(".dst"), data.dstText, 130);
      break;
    case "tts.audio": enqueueAudio(data.audio); break;
    case "metrics":
      if (curTurn) curTurn.querySelector(".meta").innerHTML =
        `<span class="badge">STT ${data.sttMs}ms</span><span class="badge">NMT ${data.nmtMs}ms</span><span class="badge">E2E ${data.e2eMs}ms</span>`;
      curTurn = null;
      break;
    case "error": log("err", "error", data); break;
  }
}
function newTurn(speaker, lang) {
  const t = document.createElement("div"); t.className = "turn";
  t.innerHTML = `<div class="spk">${speaker || "?"} ${lang ? "· " + lang : ""}</div>
    <div class="src"></div><div class="dst"></div><div class="meta"></div>`;
  $("turns").prepend(t);
  return t;
}
function showLive() { $("live").style.display = ""; }
function hideLive() { $("live").style.display = "none"; $("liveSrc").textContent = ""; $("liveDst").textContent = ""; }
// Hàng đợi audio: mỗi cụm (tts.audio) phát lần lượt, không đè lên cụm trước.
function enqueueAudio(b64) { audioQueue.push(b64); if (!audioBusy) playNext(); }
function playNext() {
  const b64 = audioQueue.shift();
  if (!b64) { audioBusy = false; return; }
  audioBusy = true;
  const mime = b64.startsWith("UklGR") ? "audio/wav" : "audio/mpeg";   // WAV (mock) vs MP3 (edge-tts)
  const p = $("player");
  p.src = "data:" + mime + ";base64," + b64;
  p.onended = playNext;
  p.onerror = () => { log("err", "audio.play", "phát lỗi"); playNext(); };
  p.play().catch(() => playNext());
}

// ---------- word-by-word reveal (debounce, real-time) ----------
let reveal = null;
function startReveal(el, text, cadence = 110) {
  stopReveal();
  const words = (text || "").split(/\s+/).filter(Boolean);
  reveal = { el, words, i: 0, cadence };
  el.textContent = "";
  revealTick();
}
function revealTick() {
  if (!reveal) return;
  reveal.i++;
  reveal.el.textContent = reveal.words.slice(0, reveal.i).join(" ");
  if (reveal.i >= reveal.words.length) { stopReveal(); return; }
  reveal.timer = setTimeout(revealTick, reveal.cadence);
}
function stopReveal() { if (reveal && reveal.timer) clearTimeout(reveal.timer); reveal = null; }
// Đẩy nhanh reveal tới từ thứ n (theo giọng nói) — không lùi.
function syncRevealTo(n) {
  if (!reveal || n <= reveal.i) return;
  reveal.i = Math.min(n, reveal.words.length);
  reveal.el.textContent = reveal.words.slice(0, reveal.i).join(" ");
}

// ---------- browser voice (speechSynthesis) — no backend/Piper needed ----------
// getVoices() có thể rỗng cho tới khi sự kiện 'voiceschanged'.
let voices = [];
function loadVoices() { if ("speechSynthesis" in window) voices = window.speechSynthesis.getVoices() || []; }
if ("speechSynthesis" in window) { loadVoices(); window.speechSynthesis.onvoiceschanged = loadVoices; }
// Chọn ĐÚNG giọng theo ngôn ngữ (không để trình duyệt đọc VN bằng giọng EN).
function pickVoice(lang) {
  const want = lang === "vi" ? "vi" : "en";
  const list = voices.length ? voices : (("speechSynthesis" in window) ? window.speechSynthesis.getVoices() : []);
  const m = list.filter((v) => (v.lang || "").toLowerCase().startsWith(want));
  return m.find((v) => /natural|online/i.test(v.name)) || m[0] || null;  // ưu tiên giọng "Natural/Online"
}
let noViWarned = false;
function speak(text, lang) {
  if (!$("ttsOn").checked || !("speechSynthesis" in window) || !text) return;
  const v = pickVoice(lang);
  if (!v && lang === "vi") {
    if (!noViWarned) {
      noViWarned = true;
      log("t", "tts", "Trình duyệt chưa có giọng TIẾNG VIỆT — bỏ đọc để tránh sai âm. Cài: Windows → Cài đặt → Thời gian & Ngôn ngữ → Giọng nói → Thêm giọng (Tiếng Việt), hoặc mở bằng Microsoft Edge.");
    }
    return;   // reveal chữ vẫn chạy (timer); chỉ không đọc sai âm.
  }
  try {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    if (v) u.voice = v;
    u.lang = v ? v.lang : (lang === "vi" ? "vi-VN" : "en-US");
    u.rate = 1.0;
    u.onboundary = (e) => {
      if (e.name && e.name !== "word") return;
      const upto = text.slice(0, e.charIndex).split(/\s+/).filter(Boolean).length + 1;
      syncRevealTo(upto);   // khớp chữ với từ đang đọc
    };
    window.speechSynthesis.speak(u);
  } catch (err) { log("err", "tts.speak", err.message); }
}

// ---------- mic capture → 16kHz mono WAV ----------
async function startRec() {
  stream = await navigator.mediaDevices.getUserMedia({ audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true } });
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  inRate = audioCtx.sampleRate;
  sourceNode = audioCtx.createMediaStreamSource(stream);
  processor = audioCtx.createScriptProcessor(4096, 1, 1);
  segFrames = []; segMs = 0; silenceMs = 0; speaking = false;
  processor.onaudioprocess = onAudioFrame;
  sourceNode.connect(processor); processor.connect(audioCtx.destination);
  recording = true;
  $("stageHint").style.display = "none";
  // Khóa nguồn/đích/chế độ khi đang thu -> không đổi chiều dịch giữa chừng.
  $("src").disabled = $("dst").disabled = $("mode").disabled = true;
  $("rec").classList.add("active"); $("rec").textContent = "Dừng lại";
}

// Phát hiện cụm theo năng lượng: gom frame khi đang nói, chốt cụm khi ngừng đủ lâu.
function onAudioFrame(e) {
  if (!recording) return;
  const f = new Float32Array(e.inputBuffer.getChannelData(0));
  const frameMs = (f.length / inRate) * 1000;
  let sum = 0; for (let i = 0; i < f.length; i++) sum += f[i] * f[i];
  const rms = Math.sqrt(sum / f.length);
  if (rms > SPEECH_RMS) { speaking = true; silenceMs = 0; }
  else if (speaking) { silenceMs += frameMs; }
  if (speaking) { segFrames.push(f); segMs += frameMs; }
  if ((speaking && silenceMs >= SILENCE_MS && segMs >= MIN_SEG_MS) || segMs >= MAX_SEG_MS) {
    finalizeSegment();
  }
}
// Gửi một CỤM đã nói -> backend STT+NMT+TTS -> một lượt + audio (phát cuốn chiếu).
function finalizeSegment() {
  const frames = segFrames;
  segFrames = []; segMs = 0; silenceMs = 0; speaking = false;
  if (!frames.length) return;
  const wav = encodeWav(downsample(mergeChunks(frames), inRate, 16000), 16000);
  send("audio.chunk", { speaker: "me", audio: abToB64(wav) });
}
function stopRec() {
  recording = false;
  processor.disconnect(); sourceNode.disconnect();
  stream.getTracks().forEach((t) => t.stop());
  audioCtx.close();
  $("rec").classList.remove("active"); $("rec").textContent = "Nhấn để nói";
  $("src").disabled = $("dst").disabled = $("mode").disabled = false;   // mở khóa lại
  finalizeSegment();   // gửi nốt cụm cuối cùng
}
function mergeChunks(list) {
  const len = list.reduce((a, c) => a + c.length, 0);
  const out = new Float32Array(len); let off = 0;
  for (const c of list) { out.set(c, off); off += c.length; }
  return out;
}
function downsample(buf, inR, outR) {
  if (outR >= inR) return buf;
  const ratio = inR / outR, newLen = Math.round(buf.length / ratio);

    res[iRes++] = cnt ? acc / cnt : 0; iBuf = next;

  ws(0, "RIFF"); v.setUint32(4, 36 + f32.length * 2, true); ws(8, "WAVE"); ws(12, "fmt ");
  v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);

// ---------- fake audio (mock mode) ----------
function sendFake() {
  const silent = encodeWav(new Float32Array(1600), 16000); // 0.1s silence
  send("audio.chunk", { speaker: "fake", audio: abToB64(silent) });
}

// ---------- wire buttons ----------
$("connect").onclick = connect;
$("end").onclick = () => { send("session.end", {}); ws.close(); };
$("rec").onclick = () => (recording ? stopRec() : startRec().catch((e) => log("err", "mic", e.message)));
$("fake").onclick = sendFake;
$("ttsOn").onchange = () => {
  if (ws && ws.readyState === 1) send("config.update", { ttsOn: $("ttsOn").checked });
  if (!$("ttsOn").checked && "speechSynthesis" in window) window.speechSynthesis.cancel();
};
$("mode").onchange = () => { if (ws && ws.readyState === 1) send("config.update", { mode: $("mode").value }); };
// Đổi Nguồn/Đích giữa các lượt -> gửi lại session.start để backend theo đúng chiều dịch.
$("src").onchange = $("dst").onchange = () => {
  if (ws && ws.readyState === 1 && !recording)
    send("session.start", { mode: $("mode").value, sourceLang: $("src").value, targetLang: $("dst").value });
};
