<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VI⇄EN Translator — Test Console</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --panel2: #1e222b; --border: #2a2f3a;
    --text: #e6e9ef; --muted: #9aa4b2; --accent: #4f8cff; --ok: #34d399;
    --warn: #fbbf24; --err: #f87171; --mono: ui-monospace, "Cascadia Code", Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
  header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  #status { font-size: 13px; padding: 3px 10px; border-radius: 999px; background: var(--panel2); color: var(--muted); }
  #status.on { color: var(--ok); } #status.err { color: var(--err); }
  main { display: grid; grid-template-columns: 340px 1fr; gap: 16px; padding: 16px; align-items: start; }
  @media (max-width: 820px) { main { grid-template-columns: 1fr; } }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .card h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin: 0 0 12px; }
  label { display: block; font-size: 12px; color: var(--muted); margin: 10px 0 4px; }
  select, input[type=text] { width: 100%; padding: 8px 10px; background: var(--panel2); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-size: 14px; }
  .row { display: flex; gap: 10px; } .row > * { flex: 1; }
  .check { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
  .check input { width: 16px; height: 16px; }
  button { cursor: pointer; border: none; border-radius: 8px; padding: 10px 14px; font-size: 14px; font-weight: 600; color: #fff; background: var(--accent); transition: filter .15s, opacity .15s; }
  button:hover { filter: brightness(1.1); } button:disabled { opacity: .4; cursor: not-allowed; }
  button.ghost { background: var(--panel2); color: var(--text); border: 1px solid var(--border); }
  button.rec { background: var(--err); } button.rec.active { animation: pulse 1.2s infinite; }
  button.wide { width: 100%; margin-top: 12px; }
  @keyframes pulse { 0%,100% { filter: brightness(1); } 50% { filter: brightness(1.4); } }
  .turn { background: var(--panel2); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 8px; padding: 12px; margin-bottom: 10px; }
  .turn .spk { font-size: 11px; color: var(--muted); text-transform: uppercase; }
  .turn .src { color: var(--muted); margin: 6px 0 2px; font-size: 14px; }
  .turn .dst { font-size: 16px; font-weight: 600; margin: 2px 0 6px; }
  .turn .meta { font-size: 11px; color: var(--muted); font-family: var(--mono); display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .badge { font-size: 10px; padding: 1px 6px; border-radius: 4px; background: var(--border); color: var(--text); }
  .partial { opacity: .6; font-style: italic; }
  #log { font-family: var(--mono); font-size: 11.5px; line-height: 1.6; max-height: 300px; overflow-y: auto; background: #0b0d11; border: 1px solid var(--border); border-radius: 8px; padding: 10px; }
  #log .in { color: var(--ok); } #log .out { color: var(--accent); } #log .e { color: var(--err); } #log .t { color: var(--muted); }
  .hint { font-size: 12px; color: var(--muted); margin-top: 8px; line-height: 1.5; }
  audio { width: 100%; margin-top: 8px; }
</style>
</head>
<body>
<header>
  <h1>🎙️ VI⇄EN Translator — Test Console</h1>
  <span id="status">disconnected</span>
</header>

<main>
  <!-- ------------ Controls ------------ -->
  <section class="card">
    <h2>Session</h2>
    <label>Mode</label>
    <select id="mode">
      <option value="cloud">cloud (Groq)</option>
      <option value="offline">offline (Whisper / sherpa)</option>
      <option value="mock">mock (no models)</option>
    </select>
    <div class="row">
      <div><label>Source</label>
        <select id="src"><option value="vi">vi</option><option value="en">en</option></select></div>
      <div><label>Target</label>
        <select id="dst"><option value="en">en</option><option value="vi">vi</option></select></div>
    </div>
    <div class="check"><input type="checkbox" id="ttsOn" checked /><label for="ttsOn" style="margin:0">TTS on (phát giọng đọc)</label></div>

    <button id="connect" class="wide">Connect &amp; Start</button>
    <button id="end" class="wide ghost" disabled>End session</button>

    <h2 style="margin-top:20px">Speak</h2>
    <button id="rec" class="rec wide" disabled>● Record (click to start)</button>
    <button id="fake" class="wide ghost" disabled>Send fake audio (mock test)</button>
    <p class="hint">Thu mic → WAV 16kHz mono → gửi <code>audio.chunk</code>. Cloud/offline dùng mic; mock có thể dùng nút fake.</p>
  </section>

  <!-- ------------ Output ------------ -->
  <div>
    <section class="card" style="margin-bottom:16px">
      <h2>Transcript &amp; Translation</h2>
      <div id="turns"></div>
      <div id="partial" class="partial"></div>
      <audio id="player" controls></audio>
    </section>
    <section class="card">
      <h2>Event log</h2>
      <div id="log"></div>
    </section>
  </div>
</main>

<script>
const $ = (id) => document.getElementById(id);
let ws = null, audioCtx = null, stream = null, processor = null, sourceNode = null;
let recording = false, chunks = [], inRate = 48000, curTurn = null;

// ---------- logging ----------
function log(dir, type, data) {
  const el = $("log");
  const cls = dir === "in" ? "in" : dir === "out" ? "out" : dir === "err" ? "e" : "t";
  const arrow = dir === "in" ? "<<<" : dir === "out" ? ">>>" : "  •";
  let txt = typeof data === "string" ? data : JSON.stringify(data);
  if (txt.length > 140) txt = txt.slice(0, 140) + "…";
  const line = document.createElement("div");
  line.className = cls;
  line.textContent = `${arrow} ${type} ${txt}`;
  el.appendChild(line); el.scrollTop = el.scrollHeight;
}
function setStatus(s, kind) { const e = $("status"); e.textContent = s; e.className = kind || ""; }

// ---------- websocket ----------
function connect() {
  const proto = location.protocol === "https:" ? "wss" : "ws";
  ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.onopen = () => {
    setStatus("connected", "on");
    send("session.start", { mode: $("mode").value, sourceLang: $("src").value, targetLang: $("dst").value });
    send("config.update", { ttsOn: $("ttsOn").checked });
    $("end").disabled = false; $("rec").disabled = false; $("fake").disabled = false;
    $("connect").disabled = true;
  };
  ws.onclose = () => { setStatus("disconnected"); resetButtons(); };
  ws.onerror = () => { setStatus("error", "err"); log("err", "ws.error", "connection failed"); };
  ws.onmessage = (ev) => handleEvent(JSON.parse(ev.data));
}
function send(type, data) { ws.send(JSON.stringify({ type, data })); log("out", type, type === "audio.chunk" ? "<audio…>" : data); }
function resetButtons() {
  $("connect").disabled = false; $("end").disabled = true;
  $("rec").disabled = true; $("fake").disabled = true;
}

function handleEvent(msg) {
  const { type, data } = msg;
  log("in", type, type === "tts.audio" ? `<audio ${data.audio.length}b64>` : data);
  switch (type) {
    case "stt.partial": $("partial").textContent = `… ${data.text}`; break;
    case "stt.final":
      $("partial").textContent = "";
      curTurn = newTurn(data.speaker, data.lang);
      curTurn.querySelector(".src").textContent = data.text;
      break;
    case "nmt.result":
      if (!curTurn) curTurn = newTurn(data.speaker, "");
      curTurn.querySelector(".src").textContent = data.srcText;
      curTurn.querySelector(".dst").textContent = data.dstText;
      break;
    case "tts.audio": playAudio(data.audio); break;
    case "metrics":
      if (curTurn) curTurn.querySelector(".meta").innerHTML =
        `<span class="badge">STT ${data.sttMs}ms</span><span class="badge">NMT ${data.nmtMs}ms</span><span class="badge">E2E ${data.e2eMs}ms</span>`;
      curTurn = null;
      break;
    case "error": log("err", "error", data); break;
  }
}
function newTurn(speaker, lang) {
  const t = document.createElement("div"); t.className = "turn";
  t.innerHTML = `<div class="spk">${speaker || "?"} ${lang ? "· " + lang : ""}</div>
    <div class="src"></div><div class="dst"></div><div class="meta"></div>`;
  $("turns").prepend(t);
  return t;
}
function playAudio(b64) {
  const url = "data:audio/wav;base64," + b64;
  $("player").src = url;
  $("player").play().catch((e) => log("err", "audio.play", e.message));
}

// ---------- mic capture → 16kHz mono WAV ----------
async function startRec() {
  stream = await navigator.mediaDevices.getUserMedia({ audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true } });
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  inRate = audioCtx.sampleRate;
  sourceNode = audioCtx.createMediaStreamSource(stream);
  processor = audioCtx.createScriptProcessor(4096, 1, 1);
  chunks = [];
  processor.onaudioprocess = (e) => chunks.push(new Float32Array(e.inputBuffer.getChannelData(0)));
  sourceNode.connect(processor); processor.connect(audioCtx.destination);
  recording = true;
  $("rec").classList.add("active"); $("rec").textContent = "■ Stop &amp; send";
}
function stopRec() {
  recording = false;
  processor.disconnect(); sourceNode.disconnect();
  stream.getTracks().forEach((t) => t.stop());
  audioCtx.close();
  $("rec").classList.remove("active"); $("rec").textContent = "● Record (click to start)";

  // merge → downsample → WAV → base64
  const merged = mergeChunks(chunks);
  const down = downsample(merged, inRate, 16000);
  const wav = encodeWav(down, 16000);
  send("audio.chunk", { speaker: "me", audio: abToB64(wav) });
}
function mergeChunks(list) {
  const len = list.reduce((a, c) => a + c.length, 0);
  const out = new Float32Array(len); let off = 0;
  for (const c of list) { out.set(c, off); off += c.length; }
  return out;
}
function downsample(buf, inR, outR) {
  if (outR >= inR) return buf;
  const ratio = inR / outR, newLen = Math.round(buf.length / ratio);
  const res = new Float32Array(newLen); let iRes = 0, iBuf = 0;
  while (iRes < newLen) {
    const next = Math.round((iRes + 1) * ratio); let acc = 0, cnt = 0;
    for (let i = iBuf; i < next && i < buf.length; i++) { acc += buf[i]; cnt++; }
    res[iRes++] = cnt ? acc / cnt : 0; iBuf = next;
  }
  return res;
}
function encodeWav(f32, rate) {
  const buf = new ArrayBuffer(44 + f32.length * 2), v = new DataView(buf);
  const ws = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
  ws(0, "RIFF"); v.setUint32(4, 36 + f32.length * 2, true); ws(8, "WAVE"); ws(12, "fmt ");
  v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
  v.setUint32(24, rate, true); v.setUint32(28, rate * 2, true); v.setUint16(32, 2, true); v.setUint16(34, 16, true);
  ws(36, "data"); v.setUint32(40, f32.length * 2, true);
  let o = 44; for (let i = 0; i < f32.length; i++) { let s = Math.max(-1, Math.min(1, f32[i])); v.setInt16(o, s < 0 ? s * 0x8000 : s * 0x7fff, true); o += 2; }
  return buf;
}
function abToB64(ab) {
  let bin = ""; const bytes = new Uint8Array(ab), chunk = 0x8000;
  for (let i = 0; i < bytes.length; i += chunk) bin += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
  return btoa(bin);
}

// ---------- fake audio (mock mode) ----------
function sendFake() {
  const silent = encodeWav(new Float32Array(1600), 16000); // 0.1s silence
  send("audio.chunk", { speaker: "fake", audio: abToB64(silent) });
}

// ---------- wire buttons ----------
$("connect").onclick = connect;
$("end").onclick = () => { send("session.end", {}); ws.close(); };
$("rec").onclick = () => (recording ? stopRec() : startRec().catch((e) => log("err", "mic", e.message)));
$("fake").onclick = sendFake;
$("ttsOn").onchange = () => { if (ws && ws.readyState === 1) send("config.update", { ttsOn: $("ttsOn").checked }); };
$("mode").onchange = () => { if (ws && ws.readyState === 1) send("config.update", { mode: $("mode").value }); };
</script>
</body>
</html>
